<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Layout com Grid</title>
</head>
<style>
.grid-page {
    display: grid;
    grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
    grid-template-columns: 250px 1fr;
    min-height: 100vh;
}

.grid-header {
    grid-area: header;
    background-color: lightgray;
    padding: 10px;
}

.grid-sidebar {
    grid-area: sidebar;
    background-color: #eee;
    padding: 10px;
}

.grid-main {
    grid-area: main;
    padding: 10px;
}

.grid-footer {
    grid-area: footer;
    background-color: lightgray;
    text-align: center;
    padding: 10px;
}

.grid-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
}

.grid-card {
    display: grid;
    place-items: center;
    height: 100px;
    border: 1px solid #ccc;
    border-radius: 10px;
}
</style>
<body>

    <div class="grid-page">

        <header class="grid-header">
            <h1>Meu Site</h1>
        </header>

        <aside class="grid-sidebar">
            <p>Menu lateral</p>
        </aside>

        <main class="grid-main">

            <h2>Galeria</h2>

            <div class="grid-cards">
                <div class="grid-card">Card 1</div>
                <div class="grid-card">Card 2</div>
                <div class="grid-card">Card 3</div>
                <div class="grid-card">Card 4</div>
                <div class="grid-card">Card 5</div>
            </div>

        </main>

        <footer class="grid-footer">
            <p>FATEC 2026</p>
        </footer>

    </div>

</body>
</html>
