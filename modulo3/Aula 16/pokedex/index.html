<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Dinâmica</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Pokédex</h1>
        <div class="busca-container">
            <input type="text" id="input-busca" placeholder="Digite o nome ou ID do Pokémon...">
            <button id="btn-busca">Buscar</button>
        </div>
        <div id="mensagem-erro" class="erro escondido"></div>
        <div id="pokedex-screen" class="escondido">
            <div class="card-pokemon">
                <img id="poke-img" src="" alt="">
                <h2 id="poke-nome"></h2>
                <p id="poke-id"></p>
                <div id="poke-tipos" class="tipos-container"></div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
